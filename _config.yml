# ─── Site ────────────────────────────────────────────────────────────────────
title: "Tokgöz Dialogues"
tagline: "Come and join me for a walk with my dog."
description: >-
  Conversations with a critical AI and reflections on technology, philosophy and
  more — recorded on walks with my dog Linux, run through a transparent prompt,
  and published with the prompts and sources in full.
author: "Benjamin Tokgöz"
email: "b.tokgoez@protonmail.com"

# Custom domain (see CNAME). Served at the root, so baseurl is empty.
url: "https://tokgoezdialogues.com"
baseurl: ""

github_username: benjamintokgoez

# Social handles (rendered in the footer + command palette)
social:
  github: benjamintokgoez
  twitter: benn0rs
  linkedin: tokgoez
  bluesky: benn0rs.bsky.social
  mastodon: "@benn0rs@fosstodon.org"
  mastodon_url: "https://fosstodon.org/@benn0rs"

# ─── Build ───────────────────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# Preserve the existing live URLs.
permalink: /:categories/:year/:month/:day/:title/
timezone: Europe/Berlin
future: true

sass:
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# ─── Defaults ────────────────────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Benjamin Tokgöz"
  - scope:
      path: ""
    values:
      layout: "page"

feed:
  path: /feed.xml

# ─── Exclude from the build ──────────────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .github
  - "*.gem"
  - "*.sh"
  - node_modules
