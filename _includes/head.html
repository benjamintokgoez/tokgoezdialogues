<meta name="theme-color" content="#1a1b26" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#e1e2e7" media="(prefers-color-scheme: light)">

{% comment %} No-flash theme: apply stored/preferred theme before first paint. {% endcomment %}
<script>
  (function () {
    var d = document.documentElement;
    d.classList.add("js"); // gate JS-only UI (palette, filter, tabs) for graceful no-JS fallback
    var t;
    try { t = localStorage.getItem("td-theme"); } catch (e) {}
    if (!t) { try { t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"; } catch (e) { t = "dark"; } }
    d.dataset.theme = t;
  })();
</script>
