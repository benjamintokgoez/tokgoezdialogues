<div class="palette-backdrop" id="palette" role="dialog" aria-modal="true" aria-label="Command palette" aria-hidden="true">
  <div class="palette" role="document">
    <div class="palette-input">
      <span class="ps" aria-hidden="true">$</span>
      <input type="text" role="combobox" aria-expanded="false" aria-controls="palette-results"
             aria-activedescendant="" aria-label="Search commands and entries"
             autocomplete="off" autocapitalize="off" spellcheck="false"
             placeholder="type a command or search entries…  (try: help, theme, random)">
    </div>
    <div class="palette-results" id="palette-results" role="listbox" aria-label="Results"></div>
    <div class="sr-only" id="palette-status" role="status" aria-live="polite"></div>
    <div class="palette-foot">
      <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
      <span><kbd>↵</kbd> run</span>
      <span><kbd>esc</kbd> close</span>
      <span><kbd>Ctrl</kbd><kbd>K</kbd> toggle</span>
    </div>
  </div>
</div>
