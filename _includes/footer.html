<footer aria-label="Site footer">
  <div class="social">
    <a href="https://github.com/{{ site.social.github }}" rel="me noopener">github</a>
    <a href="https://x.com/{{ site.social.twitter }}" rel="me noopener">x</a>
    <a href="https://www.linkedin.com/in/{{ site.social.linkedin }}/" rel="me noopener">linkedin</a>
    <a href="{{ site.social.mastodon_url }}" rel="me noopener">mastodon</a>
    <a href="https://bsky.app/profile/{{ site.social.bluesky }}" rel="me noopener">bluesky</a>
  </div>
  <div class="statusbar">
    <span class="seg mode">NORMAL</span>
    <span class="seg branch"> main</span>
    <span class="seg spacer"></span>
    <span class="seg"><a href="{{ '/feed.xml' | relative_url }}">feed.xml</a></span>
    <span class="seg js-only"><a data-open-palette role="button" tabindex="0" aria-label="Open command palette">Ctrl+K</a></span>
    <span class="seg">© {{ site.time | date: '%Y' }} {{ site.author }}</span>
  </div>
</footer>
